<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Editorial / archival OG card. Convert to PNG for prod (Vercel auto-handles SVG OG poorly). -->
  <rect width="1200" height="630" fill="#f5f1ea"/>

  <!-- Frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#0c0a09" stroke-width="3"/>

  <!-- Title -->
  <text x="80" y="200" font-family="Fraunces, Georgia, serif" font-size="96" font-weight="800" font-style="italic" fill="#0c0a09" letter-spacing="-3">
    Migration Atlas
  </text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="Fraunces, Georgia, serif" font-size="28" fill="#0c0a09">
    An interactive immigration intelligence platform.
  </text>

  <!-- Accent rule -->
  <rect x="80" y="290" width="120" height="3" fill="#c2410c"/>

  <!-- Tag chips along the bottom -->
  <g font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="2" fill="#0c0a09">
    <text x="80" y="540" textLength="380">KNOWLEDGE GRAPH · 44 NODES, 53 EDGES</text>
    <text x="80" y="568" textLength="350">FOUR ML MODELS · SIX VIEW DASHBOARD</text>
  </g>

  <!-- Mini graph mark, top-right -->
  <g transform="translate(960, 120)">
    <circle cx="80" cy="60" r="18" fill="#c2410c" stroke="#0c0a09" stroke-width="2"/>
    <circle cx="160" cy="100" r="14" fill="#1e3a8a" stroke="#0c0a09" stroke-width="2"/>
    <circle cx="100" cy="170" r="14" fill="#115e59" stroke="#0c0a09" stroke-width="2"/>
    <circle cx="180" cy="200" r="12" fill="#581c87" stroke="#0c0a09" stroke-width="2"/>
    <line x1="80" y1="60" x2="160" y2="100" stroke="#0c0a09" stroke-width="2"/>
    <line x1="160" y1="100" x2="100" y2="170" stroke="#0c0a09" stroke-width="2"/>
    <line x1="100" y1="170" x2="180" y2="200" stroke="#0c0a09" stroke-width="2"/>
    <line x1="160" y1="100" x2="180" y2="200" stroke="#0c0a09" stroke-width="2"/>
  </g>

  <!-- Footer -->
  <text x="80" y="600" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2" fill="#78716c">
    GITHUB.COM/UJJAWAL40/MIGRATION-ATLAS
  </text>
</svg>
